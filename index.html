<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Photo Editor - Step 4 Proportional</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            background-color: #ffffff;
            width: 900px;
            padding: 20px;
            text-align: center;
            border-radius: 4px;
        }

        .btn-group {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button, .file-label {
            padding: 8px 16px;
            background: #fff;
            border: 1px solid #ccc;
            cursor: pointer;
            border-radius: 4px;
            font-size: 14px;
        }

        button:hover, .file-label:hover {
            background: #f0f0f0;
        }

        /* Окно редактора (Шаг 2 и 3) */
        .img-container {
            width: 100%;
            height: 450px;
            background-color: #f0f0f0;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 1px solid #ccc;
        }

        #image {
            display: block;
            max-width: 100%;
            max-height: 100%;
        }

        /* ОКНО РЕЗУЛЬТАТА (Шаг 4) */
        /* Оно имеет синюю рамку и строго подстраивается под размеры исходного фото */
        #result-outer-box {
            display: none;
            margin: 20px auto;
            border: 2px solid #3d5a80; /* Внешняя синяя рамка */
            background-color: #ffffff; /* Белый фон для невырезанных участков */
            position: relative;
            box-sizing: border-box;
        }

        /* Контейнер для самого обрезка внутри белого поля */
        #cropped-inner-wrapper {
            position: absolute;
            box-sizing: border-box;
            border: 1px solid #3d5a80; /* Внутренняя рамка вокруг обрезка */
            line-height: 0;
        }

        #cropped-inner-wrapper img {
            width: 100%;
            height: 100%;
            display: block;
        }

        #file-input { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="btn-group">
        <label for="file-input" class="file-label">Upload image</label>
        <input type="file" id="file-input" accept="image/*">
        <button id="btn-crop">Crop image</button>
        <button id="btn-download" style="display:none;">Download new image</button>
    </div>

    <div class="img-container">
        <img id="image" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7">
    </div>

    <div id="result-outer-box">
        <div id="cropped-inner-wrapper"></div>
    </div>
</div>

<script src="index.js"></script>
</body>
</html>
